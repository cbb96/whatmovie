<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineSearch</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0f1014;
    --accent:#e50914;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
body{background:var(--bg);color:white}

/* NAV */
nav{
    position:fixed;top:0;width:100%;
    display:flex;justify-content:space-between;
    padding:20px 4%;
    background:linear-gradient(to bottom,#000,transparent);
    z-index:1000;
}
.logo{font-size:1.6rem;font-weight:800}
.logo span{color:var(--accent)}

.search{
    padding:10px 18px;
    border-radius:25px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
    width:260px;
}

/* HERO */
.hero{
    margin-top:80px;
    height:75vh;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:flex-end;
    padding:60px 4%;
    position:relative;
}
.hero::after{
    content:'';
    position:absolute;inset:0;
    background:linear-gradient(to right,#0f1014 20%,transparent 60%);
}
.hero-content{position:relative;max-width:520px}
.hero h1{font-size:3rem;font-weight:800;margin-bottom:10px}
.hero p{color:#ccc;margin-bottom:20px}

/* FILTERS */
.filters{
    padding:15px 4%;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
select{
    padding:8px 12px;
    background:#1a1c23;
    color:white;
    border:none;
    border-radius:8px;
}

/* GRID */
.grid{
    padding:10px 4% 80px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:22px;
}

/* CARD */
.card{
    position:relative;
    cursor:pointer;
    transition:.3s;
}
.card img{
    width:100%;
    border-radius:14px;
}

/* HOVER EFFECT */
.card:hover{
    transform:scale(1.12);
    z-index:10;
}
.card:hover img{
    filter:brightness(0.6);
}

/* PREVIEW OVERLAY */
.card-info{
    position:absolute;
    bottom:0;
    width:100%;
    padding:12px;
    background:linear-gradient(transparent,rgba(0,0,0,.9));
    opacity:0;
    transition:.3s;
}
.card:hover .card-info{opacity:1}

.title{font-size:15px;font-weight:600}
.rating{font-size:13px;color:#fbbf24}

/* LOADER */
.loader{text-align:center;padding:20px;color:#aaa}
</style>

</head>

<body>

<nav>
<div class="logo">Cine<span>Search</span></div>
<input id="search" class="search" placeholder="Movies, shows, actors...">
</nav>

<div id="hero" class="hero">
<div class="hero-content">
<h1 id="heroTitle">Loading...</h1>
<p id="heroDesc"></p>
</div>
</div>

<div class="filters">
<select id="sort">
<option value="popularity.desc">Popular</option>
<option value="vote_average.desc">Top Rated</option>
<option value="primary_release_date.desc">Newest</option>
</select>

<select id="year">
<option value="">All Years</option>
<option>2026</option>
<option>2025</option>
<option>2024</option>
<option>2023</option>
<option>2022</option>
</select>
</div>

<div id="grid" class="grid"></div>
<div id="loader" class="loader"></div>

<script>
const BASE='https://api.themoviedb.org/3';
const IMG='https://image.tmdb.org/t/p/w500';
const HERO_IMG='https://image.tmdb.org/t/p/original';

let API_KEY=localStorage.getItem('tmdb_api_key')||prompt("Enter TMDB API Key");
localStorage.setItem('tmdb_api_key',API_KEY);

// STATE
let page=1,totalPages=1,isLoading=false;
let query='',sort='popularity.desc',year='';

// FETCH
async function fetchData(url){
    const res=await fetch(BASE+url+(url.includes('?')?'&':'?')+'api_key='+API_KEY);
    return await res.json();
}

// HERO
function setHero(item){
    hero.style.backgroundImage=`url(${HERO_IMG+item.backdrop_path})`;
    heroTitle.textContent=item.title;
    heroDesc.textContent=item.overview;
}

// INIT
async function init(){
    const t=await fetchData('/trending/movie/day');
    setHero(t.results[0]);
    load();
}

// LOAD GRID
async function load(){
    if(isLoading || page>totalPages) return;

    isLoading=true;
    loader.textContent='Loading...';

    let url;

    if(query){
        url=`/search/movie?query=${query}&page=${page}`;
    }else{
        url=`/discover/movie?sort_by=${sort}&primary_release_year=${year}&page=${page}`;
    }

    const data=await fetchData(url);

    totalPages=data.total_pages;

    data.results.forEach(item=>{
        if(!item.poster_path) return;

        grid.innerHTML+=`
        <div class="card">
            <img src="${IMG+item.poster_path}">
            <div class="card-info">
                <div class="title">${item.title}</div>
                <div class="rating">⭐ ${item.vote_average.toFixed(1)}</div>
            </div>
        </div>`;
    });

    page++;
    isLoading=false;

    loader.textContent = page>totalPages ? 'No more results' : '';
}

// RESET
function reset(){
    page=1;
    totalPages=1;
    grid.innerHTML='';
    load();
}

// SCROLL
window.addEventListener('scroll',()=>{
    if(window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 200){
        load();
    }
});

// SEARCH
search.addEventListener('input',e=>{
    query=e.target.value.trim();

    if(query.length>2){
        reset();
    }else if(query.length===0){
        reset();
    }
});

// FILTERS
sort.onchange=()=>{
    sort=sort.value;
    reset();
};

year.onchange=()=>{
    year=year.value;
    reset();
};

// INIT
init();
</script>

</body>
</html>
